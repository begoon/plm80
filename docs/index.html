<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>plm80 playground — PL/M-80 to Intel 8080</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="title">
        <h1>plm80 <span class="sub">PL/M-80 &rarr; Intel 8080, in your browser</span></h1>
        <div class="build-time" id="build-time"></div>
      </div>
      <div class="toolbar">
        <label for="example">Example</label>
        <select id="example">
          <option value="">— load example —</option>
        </select>
        <label for="filename">File</label>
        <input
          type="text"
          id="filename"
          spellcheck="false"
          autocomplete="off"
        />
        <label for="org">org</label>
        <input
          type="text"
          id="org"
          spellcheck="false"
          autocomplete="off"
          title="code origin (hex, default 0)"
        />
        <label for="stack">sp</label>
        <input
          type="text"
          id="stack"
          spellcheck="false"
          autocomplete="off"
          title="initial stack pointer (hex, default 76CFh)"
        />
        <button
          type="button"
          id="run-bin"
          class="primary"
          title="run on RK86 (Ctrl/Cmd+E)"
        >
          run <kbd>Ctrl+E</kbd>
        </button>
        <button type="button" id="upload-btn">upload</button>
        <button type="button" id="download-btn">download</button>
        <label for="download-format">as</label>
        <select id="download-format" title="download format">
          <option value="plm" selected>.plm</option>
          <option value="asm">.asm</option>
          <option value="bin">.bin</option>
          <option value="rk">.rk</option>
          <option value="rkr">.rkr</option>
          <option value="pki">.pki</option>
          <option value="gam">.gam</option>
        </select>
        <button type="button" id="reset" class="danger">reset</button>
        <button type="button" id="theme" title="toggle theme">theme</button>
        <input
          type="file"
          id="file-input"
          accept=".plm,text/plain"
          hidden
        />
      </div>
    </header>
    <main>
      <div class="tabs" id="tabs"></div>
      <div class="panes">
        <section class="pane pane-source">
          <div class="pane-title">source.plm</div>
          <textarea
            id="source"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            wrap="off"
          ></textarea>
        </section>
        <section class="pane pane-asm">
          <div class="pane-title">output.asm</div>
          <pre id="asm"></pre>
        </section>
        <section class="pane pane-bytes">
          <div class="pane-title" id="bytes-title">bytes</div>
          <pre id="bytes"></pre>
        </section>
      </div>
      <div id="error" class="error"></div>
    </main>
    <div id="confirm-modal" class="modal" hidden>
      <div class="modal-panel confirm-panel" role="dialog" aria-modal="true">
        <p id="confirm-message"></p>
        <div class="modal-actions">
          <button type="button" id="confirm-cancel">Cancel</button>
          <button type="button" id="confirm-ok" class="primary">OK</button>
        </div>
      </div>
    </div>
    <script src="conf.js"></script>
    <script src="examples.js"></script>
    <script type="module" src="playground.js"></script>
  </body>
</html>
